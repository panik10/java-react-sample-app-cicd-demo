name: build

on: 
  workflow_dispatch:

jobs:

  lint-test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.0
      # version setup node 6.4.0 can be used, as it has node 24 and cache on for npm by default, but for demonstration reasons I will use 4.4.0
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Lint FrontEnd
        run: npm ci && npm run lint
        working-directory: client

      - name: Test FrontEnd
        run: npm test -- --watchAll=false
        working-directory: client

  lint-test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.0

      - uses: actions/setup-java@v4.8.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Lint and Test Backend
        run: ./mvnw verify
        working-directory: server
        continue-on-error: true

  build-frontend:
    needs: [lint-test-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.0
        with:
          fetch-depth: 0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-fe
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push FE Docker image
        uses: docker/build-push-action@v6.9.0
        with:
          context: ./client
          file: ./client/Dockerfile
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          push: true
          labels: |
            ${{ steps.meta.outputs.labels }}
          build-args: |
            REACT_APP_DESCOPE_PROJECT_ID=${{ secrets.DESCOPE_PROJECT_ID }}
  
  build-backend:
    needs: [lint-test-backend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.0
        with:
          fetch-depth: 0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-be
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push BE Docker image
        uses: docker/build-push-action@v6.9.0
        with:
          context: ./server
          file: ./server/Dockerfile
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          push: true
          labels: |
            ${{ steps.meta.outputs.labels }}
          build-args: |
            DESCOPE_PROJECT_ID=${{ secrets.DESCOPE_PROJECT_ID }}

