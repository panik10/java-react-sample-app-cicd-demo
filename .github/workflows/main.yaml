name: build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - deployment
      - feat/*
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - 'docs/**'
# TODO: Build only when there is changes in the appropriate directory

env:
  IMAGE_TAG: sha-${{ github.sha }}

jobs:
  # analyze-changes:
  #   runs-on: ubuntu-latest
  #   outputs:
  #     frontend: ${{ steps.filter.outputs.frontend }}
  #     backend: ${{ steps.filter.outputs.backend }}
  #   steps:
  #     - uses: actions/checkout@v4.3.0
  #     - uses: dorny/paths-filter@v3.0.3
  #       id: filter
  #       with:
  #         filters: |
  #           frontend:
  #             - 'client/**'
  #           backend:
  #             - 'server/**'

  lint-test-frontend:
    runs-on: ubuntu-latest
    # needs: analyze-changes
    # if: needs.analyze-changes.outputs.frontend == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.0
      # version setup node 6.4.0 can be used, as it has node 24 and cache on for npm by default, but for demonstration reasons I will use 4.4.0
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Lint FrontEnd
        run: npm ci && npm run lint
        working-directory: client

      - name: Test FrontEnd
        run: npm test -- --watchAll=false
        working-directory: client

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3.35.3
        with:
          languages: "javascript"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3.35.3

  lint-test-backend:
    runs-on: ubuntu-latest
    # needs: analyze-changes
    # if: needs.analyze-changes.outputs.backend == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.0

      - name: Setup Java
        uses: actions/setup-java@v4.8.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3.35.3
        with:
          languages: "java"

      - name: Build, Lint, and Test
        run: ./mvnw clean verify -B
        working-directory: server
        env:
          DESCOPE_PROJECT_ID: ${{ secrets.DESCOPE_PROJECT_ID }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3.35.3

  build-frontend:
    needs: [lint-test-frontend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.0
        with:
          fetch-depth: 0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-fe

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: Login to Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push FE Docker image
        uses: docker/build-push-action@v6.9.0
        with:
          context: ./client
          file: ./client/Dockerfile
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository }}-fe:${{ env.IMAGE_TAG }}
            ghcr.io/${{ github.repository }}-fe:latest
          push: true
          labels: |
            ${{ steps.meta.outputs.labels }}
          build-args: |
            REACT_APP_DESCOPE_PROJECT_ID=${{ secrets.DESCOPE_PROJECT_ID }}
  
      - name: Run Trivy 
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}-fe:${{ env.IMAGE_TAG }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  build-backend:
    needs: [lint-test-backend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.0
        with:
          fetch-depth: 0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-be

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: Login to Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push BE Docker image
        uses: docker/build-push-action@v6.9.0
        with:
          context: ./server
          file: ./server/Dockerfile
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository }}-be:${{ env.IMAGE_TAG }}
            ghcr.io/${{ github.repository }}-be:latest
          push: true
          labels: |
            ${{ steps.meta.outputs.labels }}
          build-args: |
            DESCOPE_PROJECT_ID=${{ secrets.DESCOPE_PROJECT_ID }}
      
      - name: Run Trivy ulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}-be:${{ env.IMAGE_TAG }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  deploy-stage:
    needs: [build-frontend, build-backend]
    runs-on: ubuntu-latest
    environment: Stage
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.0
        with:
          fetch-depth: 0
      
      - name: Deployment to Stage
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          # fingerprint: ${{ secrets.FINGERPRINT }}
          script: |
            echo "Tag to deploy is ${{ github.sha }}"
            whoami
            docker compose up -d --force-recreate
