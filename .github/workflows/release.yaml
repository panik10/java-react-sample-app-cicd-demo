name: Release

on: 
  push:
    tags:
       - v*.*.*

jobs:
  deploy-prod:
    environment: Production
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.0
        with:
          fetch-depth: 0
      
      - name: Login to Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      
      - name: Add version tag to image
        run: |
          RELEASE_VERSION=${GITHUB_REF#refs/tags/v}
          
          docker buildx imagetools create ghcr.io/${{ github.repository }}-be:latest \
            --tag ghcr.io/${{ github.repository }}-be:$RELEASE_VERSION
            
          docker buildx imagetools create ghcr.io/${{ github.repository }}-fe:latest \
            --tag ghcr.io/${{ github.repository }}-fe:$RELEASE_VERSION
      
      - name: Deployment to Stage
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          # fingerprint: ${{ secrets.FINGERPRINT }}
          script: |
            echo "Tag to deploy is ${{ github.sha }}, version $RELEASE_VERSION"
            whoami
            cd /home/azureuser/prod/
            export IMAGE_TAG=${{ env.IMAGE_TAG }}
            docker stack deploy -c docker-compose.yml stage_app
