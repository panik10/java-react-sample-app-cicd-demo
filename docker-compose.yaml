services:
  backend:
    image: ghcr.io/panik10/java-react-sample-app-cicd-demo-be:${IMAGE_TAG}
    networks:
      - app-net
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        delay: 10s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ghcr.io/panik10/java-react-sample-app-cicd-demo-fe:${IMAGE_TAG}
    ports:
      - "8081:80"
    networks:
      - app-net
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        delay: 10s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  app-net:
    driver: overlay